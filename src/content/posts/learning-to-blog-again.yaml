title: Learning to blog again
date: 2026-03-31
excerpt: First post, miss you mom.
content: >-
  It's been years since I've written anything for a blog, but I figured that
  writing again during one of the most tumultuous months of my life might help
  me sort out my thoughts, feelings, and silly ideas. Let's give it a go.

  If you stumble upon my page and this blog, expect some ramblings about code
  and technology, politics and struggle, films, and the occasional hobby or
  obsession I happen to be having at the moment. But this first post I dedicate
  to my mother, who tragically passed away on February 28th. I miss you and I
  love you so much.
