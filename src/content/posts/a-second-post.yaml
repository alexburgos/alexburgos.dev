title: A Second Post
date: 2026-04-14
content: >-
  This one took me some time. I wasn't sure what to write about. Things moved
  incredibly fast these past two weeks, and yet I feel like my world has slowed
  all the way down. My mom passed a little over a month ago. And then, I stopped
  working at Kiwi.com after my entire team was swept up in a brutal round of
  layoffs. Two massive things, back to back, and I am still processing both of
  them.


  But there are silver linings, and I'm holding onto them. I have more time now
  to get back to things I'd let drift: shooting more analog film, finally
  building that PC I've been putting off, mentoring for aspiring developers I
  mentor at MigraCode, building their next platform iteration as well.


  I have a feeling things will work out for me. I have to believe that. But
  right now I'm caught between wanting to do absolutely nothing for a month, and
  the subtle internal pressure to push forward with the job search. But this
  week I made some updates to my website and put together a loose list in my
  head of where I want to take it. I've started reaching out to companies and
  recruiters. And I had my first post-layoff LeetCode interview. Not a big fan
  of those, but I did it.


  Things will work out. I have to believe it.
